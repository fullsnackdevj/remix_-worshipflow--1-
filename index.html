<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICLC WorshipFlow</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Theme & App Meta -->
  <meta name="theme-color" content="#6366f1" />
  <meta name="application-name" content="WorshipFlow" />
  <meta name="description" content="Worship team scheduling, song & member management" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WorshipFlow" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />

  <!-- DNS prefetch — resolves Firebase/Google hostnames before first API call -->
  <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
  <link rel="dns-prefetch" href="https://securetoken.googleapis.com" />
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
  <!-- Prevent flash-of-white before React mounts -->
  <style>html,body,#root{background:#111827;margin:0}</style>
  <script>
    (function(){try{var t=localStorage.getItem('wf_ui_theme');if(t&&t!=='default')document.documentElement.setAttribute('data-theme',t);}catch(e){}}());
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Register Service Worker (silent — no console noise in prod) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>

</html>
