[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[functions]
  node_bundler = "esbuild"

# ── Edge Functions ────────────────────────────────────────────────────────────
# Runs at the CDN edge BEFORE HTML reaches the browser.
# Injects the slug-specific manifest link so iOS "Add to Home Screen" pins
# the correct /p/:slug URL instead of the root "/".
[[edge_functions]]
  path = "/p/*"
  function = "playlist-manifest-injector"

[build.environment]
  RESEND_API_KEY = ""

# ── API routes → Netlify Function ────────────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# ── Public event path-based routes (mobile-safe: iOS PWA preserves paths, drops query params) ──
[[redirects]]
  from = "/r/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/d/*"
  to = "/index.html"
  status = 200

# ── Public playlist path ──────────────────────────────────────────────────────
[[redirects]]
  from = "/p/*"
  to = "/index.html"
  status = 200

# ── SPA fallback ─────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security + caching headers ───────────────────────────────────────────────

# Hashed JS/CSS chunks: immutable cache (they change hash on every build)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

# HTML: always revalidate so new deploys are picked up instantly
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# SW, manifest, icons: short cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-store"

# JSON data files: no-cache so they always refresh
[[headers]]
  for = "/release-notes.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
